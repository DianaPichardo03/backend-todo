<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <title>📝 Tareas</title>
     <link rel="stylesheet" href="style.css">
</head>

<body>
   <div class="container">
    <h1>📝 Mis Tareas</h1>

     <div class="contador">
    <p id="total" class="card-total">
    Total: 0
  </p>
  <p id="pendientes" class="card-pendientes">
    Pendientes: 0
  </p>
  <p id="completadas" class="card-completadas">
    Completadas: 0
  </p>
</div>
    <div class="input-group">

      <input id="tarea" placeholder="Escribe una tarea">

      <button onclick="agregarTarea()">Agregar</button>

   </div>
   <div class="filtros">
  <button onclick="filtro('todas')">Todas</button>
  <button onclick="filtro('pendientes')">Pendientes</button>
  <button onclick="filtro('completadas')">Completadas</button>
</div>

    <ul id="lista"></ul>
<footer class="footer">
      Elaborado por ISC Diana Pichardo
    </footer>

  </div>
   <script src="app.js"></script>

</body>

</html>

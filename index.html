<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <title>📝 Tareas</title>
     <link rel="stylesheet" href="style.css">
</head>

<body>
   <div class="container">
    <h1>📝 Mis Tareas</h1>

     <div class="contador">
      <div class="card-total">
    <h2 id="total">0</h2>
    <span>Total</span>
  </div>
  <div class="card-pendientes">
    <h2 id="pendientes">0</h2>
    <span>Pendientes</span>
  </div>
    <div class="card-completadas">
    <h2 id="completadas">0</h2>
    <span>✔</span>
  </div>
</div>
    <div class="input-group">

      <input id="tarea" placeholder="Escribe una tarea">

      <button onclick="agregarTarea()">Agregar</button>

   </div>
   <div class="filtros">
  <button onclick="filtro('todas')">Todas</button>
  <button onclick="filtro('pendientes')">Pendientes</button>
  <button onclick="filtro('completadas')">Completadas</button>
</div>

    <ul id="lista"></ul>
<footer class="footer">
      Elaborado por ISC Diana Pichardo
    </footer>

  </div>
   <script src="app.js"></script>

</body>

</html>
